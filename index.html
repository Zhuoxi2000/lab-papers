<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>实验室论文看板</title>
<style>
:root{
  --bg:#0f1216; --bg2:#12161c;
  --glass:rgba(255,255,255,.045); --glass2:rgba(255,255,255,.07);
  --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.16);
  --ink:#e9edf2; --muted:#9aa4b1; --faint:#68727f;
  --ok:#3ecf8e; --warn:#e5b454; --pre:#6ea8ff; --rev:#8b95a3;
  --serif:"Songti SC","Noto Serif SC","STSong","SimSun",Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Segoe UI",sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.65;
  -webkit-font-smoothing:antialiased;min-height:100vh}
/* 极光底色：跟随当前页面主色 */
.aurora{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;background:
  radial-gradient(52% 42% at 12% -6%, hsla(var(--hue,215),70%,55%,.16), transparent 62%),
  radial-gradient(44% 38% at 92% 4%, hsla(calc(var(--hue,215) + 70),65%,55%,.10), transparent 60%),
  radial-gradient(60% 50% at 50% 112%, hsla(var(--hue,215),60%,45%,.10), transparent 55%),
  linear-gradient(180deg,var(--bg2),var(--bg) 40%);
  transition:background .6s ease}
a{color:inherit;text-decoration:none}
button{font-family:inherit;font-size:13px;cursor:pointer}
:focus-visible{outline:2px solid hsla(var(--hue,215),80%,70%,.9);outline-offset:2px;border-radius:4px}
.wrap{max-width:1060px;margin:0 auto;padding:0 22px 70px}

/* ---------- 顶栏 ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:26px 0 8px}
.brand{display:flex;flex-direction:column;gap:1px}
.brand .eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;color:var(--faint);text-transform:uppercase}
.brand a{font-family:var(--serif);font-size:21px;font-weight:700;letter-spacing:.02em}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{background:var(--glass);border:1px solid var(--line);border-radius:9px;padding:6.5px 14px;color:var(--ink);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:border-color .18s,background .18s,transform .18s}
.btn:hover{border-color:var(--line2);background:var(--glass2)}
.btn.primary{background:hsla(var(--hue,215),75%,62%,.16);border-color:hsla(var(--hue,215),75%,66%,.45);color:hsl(var(--hue,215),85%,78%)}
.btn.primary:hover{background:hsla(var(--hue,215),75%,62%,.26)}
.btn.toggle[aria-pressed="true"]{background:hsla(var(--hue,215),75%,62%,.2);border-color:hsla(var(--hue,215),75%,66%,.55);
  color:hsl(var(--hue,215),85%,80%);font-weight:600}
.btn.ghost{background:none;border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--ink);border-color:var(--line)}

body:not(.editing) .edit-only{display:none!important}
.edit-banner{margin:12px 0 2px;padding:9px 15px;border:1px solid hsla(var(--hue,215),70%,65%,.35);
  background:hsla(var(--hue,215),70%,60%,.08);border-radius:10px;font-size:12.5px;color:var(--muted);
  display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center;backdrop-filter:blur(8px)}
.edit-banner b{color:var(--ink)}
.edit-banner button{background:none;border:none;color:hsl(var(--hue,215),80%,75%);text-decoration:underline;padding:0}

/* ---------- 通用玻璃卡 ---------- */
.card{background:var(--glass);border:1px solid var(--line);border-radius:16px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}

/* ---------- 首页：成员墙 ---------- */
.home-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:26px 0 16px}
.home-head h1{font-family:var(--serif);font-size:30px;margin:0;letter-spacing:.01em;text-wrap:balance}
.home-head .sub{color:var(--faint);font-size:12.5px}
.seg{display:inline-flex;background:var(--glass);border:1px solid var(--line);border-radius:10px;padding:3px;backdrop-filter:blur(10px)}
.seg button{background:none;border:none;border-radius:7px;padding:4.5px 12px;color:var(--muted);font-size:12.5px}
.seg button[aria-pressed="true"]{background:var(--glass2);color:var(--ink);font-weight:600}
.people{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:14px}
.pcard{position:relative;padding:20px 20px 16px;display:flex;flex-direction:column;gap:12px;cursor:pointer;
  overflow:hidden;transition:transform .22s ease,border-color .22s ease,box-shadow .22s ease}
.pcard:hover{transform:translateY(-3px);border-color:hsla(var(--h),75%,68%,.5);
  box-shadow:0 14px 44px -18px hsla(var(--h),80%,55%,.45)}
.pcard .ghost-initial{position:absolute;right:-8px;top:-26px;font-family:var(--serif);font-weight:700;
  font-size:120px;line-height:1;color:hsla(var(--h),75%,70%,.07);pointer-events:none;user-select:none}
.phead{display:flex;align-items:center;gap:13px}
.pavatar{width:46px;height:46px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:20px;font-weight:700;color:hsl(var(--h),85%,82%);
  background:hsla(var(--h),75%,60%,.14);border:1px solid hsla(var(--h),75%,68%,.45);
  box-shadow:0 0 18px -4px hsla(var(--h),80%,60%,.5)}
.pname{font-family:var(--serif);font-size:19px;font-weight:700}
.prole{font-size:12px;color:var(--muted)}
.pfocus{display:inline-block;font-size:11.5px;color:hsl(var(--h),70%,78%);background:hsla(var(--h),70%,60%,.1);
  border:1px solid hsla(var(--h),70%,65%,.28);border-radius:999px;padding:1.5px 10px;width:fit-content}
.pstats{display:grid;grid-template-columns:repeat(4,auto);justify-content:space-between;gap:8px;
  border-top:1px solid var(--line);padding-top:12px}
.pstats .n{font-family:var(--mono);font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
.pstats .l{font-size:10.5px;color:var(--faint);letter-spacing:.04em}
.pcard .go{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--faint);
  transition:color .2s,transform .2s}
.pcard:hover .go{color:hsl(var(--h),80%,75%);transform:translateX(3px)}
.pcard-actions{position:absolute;top:12px;right:12px;display:flex;gap:6px}
.pcard-actions button{background:rgba(15,18,22,.6);border:1px solid var(--line);border-radius:7px;
  color:var(--muted);font-size:11.5px;padding:2.5px 9px;backdrop-filter:blur(6px)}
.pcard-actions button:hover{color:var(--ink);border-color:var(--line2)}
.pcard.add-card{border-style:dashed;align-items:center;justify-content:center;min-height:170px;
  color:var(--muted);background:none;font-size:14px;gap:6px}
.pcard.add-card:hover{color:hsl(215,80%,75%);border-color:hsla(215,75%,68%,.5)}

/* 入场动画 */
@media (prefers-reduced-motion: no-preference){
  .anim .pcard,.anim .tile,.anim .paper-row,.anim .hero{animation:rise .5s cubic-bezier(.2,.7,.3,1) both}
  .anim .pcard:nth-child(2),.anim .tile:nth-child(2){animation-delay:.05s}
  .anim .pcard:nth-child(3),.anim .tile:nth-child(3){animation-delay:.1s}
  .anim .pcard:nth-child(4),.anim .tile:nth-child(4){animation-delay:.15s}
  .anim .pcard:nth-child(5){animation-delay:.2s}
  .anim .pcard:nth-child(6){animation-delay:.25s}
  .anim .pcard:nth-child(n+7){animation-delay:.3s}
  .anim .chart-tile{animation:rise .55s .18s cubic-bezier(.2,.7,.3,1) both}
  .anim .draw{stroke-dasharray:1200;stroke-dashoffset:1200;animation:draw 1.1s .25s ease-out forwards}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes draw{to{stroke-dashoffset:0}}
}

/* ---------- 个人页 ---------- */
.back{display:inline-flex;align-items:center;gap:6px;color:var(--faint);font-size:12.5px;margin:18px 0 14px;
  font-family:var(--mono)}
.back:hover{color:var(--ink)}
.hero{position:relative;padding:26px 28px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;overflow:hidden}
.hero .ghost-initial{position:absolute;right:6px;top:-54px;font-family:var(--serif);font-weight:700;
  font-size:230px;line-height:1;color:hsla(var(--h),75%,70%,.06);pointer-events:none;user-select:none}
.hero .pavatar{width:74px;height:74px;font-size:32px;box-shadow:0 0 34px -6px hsla(var(--h),80%,60%,.65)}
.hero h1{font-family:var(--serif);font-size:32px;margin:0;line-height:1.2}
.hero .meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:6px}
.hero .prole{font-size:13px}
.hero-actions{margin-left:auto;display:flex;gap:8px;position:relative;z-index:1}

.bento{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
@media (max-width:840px){.bento{grid-template-columns:repeat(2,1fr)}}
.tile{padding:16px 18px 13px;position:relative;overflow:hidden}
.tile .lbl{font-size:11px;color:var(--faint);letter-spacing:.1em;font-family:var(--mono);text-transform:uppercase}
.tile .num{font-family:var(--serif);font-size:38px;font-weight:700;line-height:1.25;font-variant-numeric:tabular-nums;
  color:var(--ink)}
.tile .sub{font-size:11.5px;color:var(--muted)}
.tile.hl .num{color:hsl(var(--h),82%,76%);text-shadow:0 0 26px hsla(var(--h),85%,60%,.45)}
.tile .corner{position:absolute;right:14px;top:14px;font-size:11px;font-family:var(--mono);color:var(--faint)}

.chart-bento{display:grid;grid-template-columns:1.7fr 1fr;gap:12px;margin-top:12px}
@media (max-width:840px){.chart-bento{grid-template-columns:1fr}}
.chart-tile{padding:18px 20px 14px;display:flex;flex-direction:column}
.chart-tile .empty{margin:auto 0}
.chart-tile h3{font-family:var(--serif);font-size:15.5px;margin:0}
.chart-tile .desc{font-size:11.5px;color:var(--faint);margin:1px 0 10px}
.chart-tile svg{width:100%;height:auto;display:block}
.donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.donut-legend{font-size:12.5px;color:var(--muted);display:flex;flex-direction:column;gap:7px}
.donut-legend .sw{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:7px}
.donut-legend b{color:var(--ink);font-family:var(--mono)}

/* ---------- 论文列表 ---------- */
.sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:26px 0 10px}
.sec-head h2{font-family:var(--serif);font-size:19px;margin:0}
.sec-head .cnt{font-family:var(--mono);font-size:12px;color:var(--faint);margin-left:8px}
.paper-stack{display:flex;flex-direction:column;gap:10px}
.paper-row{padding:15px 18px;display:grid;grid-template-columns:1fr auto;gap:6px 18px;align-items:center;
  transition:border-color .2s}
.paper-row:hover{border-color:hsla(var(--h),70%,66%,.4)}
.paper-row .ttl{font-weight:600;font-size:14px;line-height:1.5}
.paper-row .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:4px}
.paper-row .meta a{font-family:var(--mono);font-size:11.5px;color:hsl(var(--h),75%,74%)}
.paper-row .meta a:hover{text-decoration:underline}
.paper-row .cites{text-align:right;white-space:nowrap;display:flex;align-items:center;gap:10px;justify-content:flex-end}
.paper-row .cnum{font-family:var(--mono);font-size:19px;font-weight:700;font-variant-numeric:tabular-nums}
.paper-row .cnum small{font-size:10px;color:var(--faint);font-weight:400;display:block;letter-spacing:.06em}
.paper-row .acts{grid-column:1 / -1;display:flex;gap:12px;font-size:12px;border-top:1px dashed var(--line);padding-top:8px}
.paper-row .acts button{background:none;border:none;color:var(--muted);padding:0;text-decoration:underline}
.paper-row .acts button:hover{color:var(--ink)}
.chip{display:inline-block;border-radius:999px;padding:1.5px 10px;font-size:11.5px;white-space:nowrap}
.st-published{background:rgba(62,207,142,.13);color:var(--ok)}
.st-accepted{background:rgba(229,180,84,.13);color:var(--warn)}
.st-preprint{background:rgba(110,168,255,.13);color:var(--pre)}
.st-review{background:rgba(139,149,163,.14);color:var(--rev)}
.tier{font-family:var(--mono);font-size:10px;padding:1px 7px;border-radius:5px;white-space:nowrap}
.tier-A{background:var(--ink);color:#12161c;font-weight:700}
.tier-B{border:1px solid var(--line2);color:var(--ink)}
.tier-C{border:1px solid var(--line);color:var(--muted)}
.tier-W{border:1px dashed var(--line);color:var(--muted)}
.yr{font-family:var(--mono);color:var(--faint)}
.rising{font-size:11px;color:hsl(var(--h),82%,74%);background:hsla(var(--h),80%,62%,.13);
  border-radius:999px;padding:1px 9px;white-space:nowrap}
.nospark{color:var(--faint);font-size:12px}
.hint-arxiv{font-size:11px;color:var(--warn);border:1px dashed rgba(229,180,84,.4);border-radius:6px;padding:0 7px}
.empty{padding:30px;text-align:center;color:var(--faint);border:1px dashed var(--line);border-radius:14px}

/* ---------- 数据说明页 ---------- */
.doc{max-width:760px}
.doc h1{font-family:var(--serif);font-size:26px;margin:20px 0 6px}
.doc h2{font-family:var(--serif);font-size:18px;margin:26px 0 8px}
.doc p{color:var(--muted);margin:8px 0;max-width:70ch}
.doc b{color:var(--ink)}
.doc .note{font-size:12.5px;color:var(--faint)}
.path-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:11px;margin:14px 0}
.path-card{padding:14px 16px}
.path-card h4{margin:6px 0;font-size:13.5px;color:var(--ink)}
.path-card p{font-size:12.5px;margin:0;line-height:1.7}
pre{background:rgba(0,0,0,.42);border:1px solid var(--line);color:#cdd6e0;border-radius:12px;
  padding:15px 17px;overflow-x:auto;font-family:var(--mono);font-size:12px;line-height:1.7;margin:10px 0}
pre .cm{color:#68727f}
.code-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:18px;flex-wrap:wrap}
.code-head span{font-size:12.5px;color:var(--muted)}
.kbd{font-family:var(--mono);font-size:11.5px;background:rgba(255,255,255,.08);border-radius:5px;padding:1px 6px;color:var(--ink)}

/* ---------- 弹窗 ---------- */
dialog{border:1px solid var(--line2);border-radius:16px;padding:0;max-width:560px;width:calc(100vw - 48px);
  background:#161b22;color:var(--ink);box-shadow:0 30px 80px rgba(0,0,0,.6)}
dialog::backdrop{background:rgba(5,8,12,.66);backdrop-filter:blur(4px)}
.dlg-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px 0}
.dlg-head h3{font-family:var(--serif);font-size:18px;margin:0}
.dlg-close{background:none;border:none;font-size:17px;color:var(--faint);line-height:1}
.dlg-close:hover{color:var(--ink)}
form.dlg-body{padding:14px 22px 20px;display:grid;grid-template-columns:1fr 1fr;gap:11px 14px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1 / -1}
.field label{font-size:11.5px;color:var(--muted)}
.field label .req{color:#ff8f7e}
.field input,.field select{border:1px solid var(--line2);border-radius:8px;padding:7.5px 10px;font-size:13px;
  font-family:inherit;color:var(--ink);background:rgba(255,255,255,.05)}
.field input::placeholder{color:var(--faint)}
.field .hint{font-size:11px;color:var(--faint)}
.dlg-foot{grid-column:1 / -1;display:flex;justify-content:flex-end;gap:8px;margin-top:6px}

footer{margin-top:52px;padding-top:16px;border-top:1px solid var(--line);font-size:11.5px;color:var(--faint);
  display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
footer a{color:var(--muted);text-decoration:underline}
/* 本地草稿提示条 */
.draft-bar{margin:12px 0 2px;padding:9px 15px;border:1px solid rgba(229,180,84,.45);
  background:rgba(229,180,84,.09);border-radius:10px;font-size:12.5px;color:var(--muted);
  display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center;backdrop-filter:blur(8px)}
.draft-bar b{color:var(--warn)}
.draft-bar button{background:none;border:none;color:var(--warn);text-decoration:underline;padding:0}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="aurora" id="aurora"></div>
<div class="wrap">
  <header class="topbar">
    <div class="brand">
      <span class="eyebrow">Lab Publications</span>
      <a href="#/">实验室论文看板</a>
    </div>
    <div class="topbar-actions">
      <a class="btn ghost" href="#/data">数据从哪来</a>
      <button class="btn" id="btnImport">导入 JSON</button>
      <button class="btn" id="btnExport">导出 JSON</button>
      <button class="btn toggle" id="btnEdit" aria-pressed="false">编辑模式</button>
      <input type="file" id="importFile" accept=".json,application/json" hidden>
    </div>
  </header>

  <div class="edit-banner edit-only" role="status">
    <span>编辑模式 — 修改保存为<b>本地草稿</b>。改完请「导出 JSON」，用它覆盖仓库里的 papers.json。</span>
  </div>

  <div class="draft-bar" id="draftBar" hidden>
    <span>正在查看<b>本地草稿</b>，与仓库 papers.json 可能不同（周更的引用数据也不会进入草稿）。</span>
    <button id="btnDiscard">丢弃草稿，回到仓库数据</button>
  </div>

  <main id="app"></main>

  <footer>
    <span>引用口径：Semantic Scholar · 每周一自动更新</span>
    <span><a href="https://github.com/Zhuoxi2000/lab-papers" target="_blank" rel="noopener">GitHub 仓库</a> · <a href="#/data">数据与更新说明</a></span>
  </footer>
</div>

<!-- 论文编辑弹窗 -->
<dialog id="paperDlg">
  <div class="dlg-head"><h3 id="paperDlgTitle">添加论文</h3><button class="dlg-close" data-close="paperDlg" aria-label="关闭">✕</button></div>
  <form class="dlg-body" id="paperForm">
    <div class="field full"><label>标题 <span class="req">*</span></label><input name="title" required></div>
    <div class="field"><label>一作 <span class="req">*</span></label><input name="first" list="memberList" required><datalist id="memberList"></datalist></div>
    <div class="field"><label>其他作者</label><input name="others" placeholder="逗号分隔，含组内成员会计入其「参与」"></div>
    <div class="field"><label>会议 / 期刊</label><input name="venue" placeholder="如 ACL 2026"></div>
    <div class="field"><label>CCF 等级</label>
      <select name="tier"><option value="">无 / 未定</option><option value="A">CCF A</option><option value="B">CCF B</option><option value="C">CCF C</option><option value="W">Workshop</option></select>
    </div>
    <div class="field"><label>年份 <span class="req">*</span></label><input name="year" type="number" min="2000" max="2100" required></div>
    <div class="field"><label>状态 <span class="req">*</span></label>
      <select name="status" required><option value="review">在投</option><option value="accepted">已录用（未见刊）</option><option value="published">已发表</option><option value="preprint">预印本</option></select>
    </div>
    <div class="field"><label>arXiv ID</label><input name="arxiv" placeholder="2506.01234"><span class="hint">填了它，脚本就能自动追引用</span></div>
    <div class="field"><label>DOI</label><input name="doi" placeholder="10.18653/v1/…"></div>
    <div class="field"><label>当前引用数</label><input name="citations" type="number" min="0" value="0"></div>
    <div class="dlg-foot"><button type="button" class="btn" data-close="paperDlg">取消</button><button type="submit" class="btn primary">保存</button></div>
  </form>
</dialog>

<!-- 成员编辑弹窗 -->
<dialog id="memberDlg">
  <div class="dlg-head"><h3 id="memberDlgTitle">添加成员</h3><button class="dlg-close" data-close="memberDlg" aria-label="关闭">✕</button></div>
  <form class="dlg-body" id="memberForm">
    <div class="field"><label>姓名 <span class="req">*</span></label><input name="name" required></div>
    <div class="field"><label>身份</label><input name="role" placeholder="如 博士生 · 三年级"></div>
    <div class="field full"><label>研究方向</label><input name="focus" placeholder="如 Agent 情商评测"></div>
    <div class="dlg-foot"><button type="button" class="btn" data-close="memberDlg">取消</button><button type="submit" class="btn primary">保存</button></div>
  </form>
</dialog>

<script>
'use strict';
const KEY = 'lab-papers-draft-v1';

// 内置兜底数据：仅在 fetch papers.json 失败（如直接双击打开文件、离线）时使用；
// 部署后权威数据源是仓库里的 papers.json
const FALLBACK = {
  members: [
    {id:'m1', name:'王卓玺', role:'Northeastern University', focus:''},
    {id:'m2', name:'张浩宇', role:'Northeastern University', focus:''},
    {id:'m3', name:'郑士博', role:'Northeastern University', focus:''}
  ],
  papers: [
    {id:'p1', title:'Can LLMs Resolve Dependencies? A Benchmark for Semantic-Versioning Constraint Reasoning and Dependency Resolution',
     first:'王卓玺', others:'张浩宇, Jingwen Hou, 郑士博', venue:'ECNCT 2026', tier:'', year:2026, status:'accepted',
     arxiv:'', doi:'', citations:0, history:[]},
    {id:'p2', title:'Lost in the Trajectory: Serial-Position Bias in LLM-as-Judge Step-Level Error Attribution on Agent Trajectories',
     first:'王卓玺', others:'Jingwen Hou, 张浩宇', venue:'AIoTC 2026', tier:'', year:2026, status:'accepted',
     arxiv:'', doi:'', citations:0, history:[]},
    {id:'p3', title:'CPEMatch: A Controlled Benchmark for LLM Reasoning over CPE/purl Vulnerability-Identifier Applicability',
     first:'王卓玺', others:'张浩宇, Jingwen Hou', venue:'AIoTC 2026', tier:'', year:2026, status:'accepted',
     arxiv:'', doi:'', citations:0, history:[]},
    {id:'p4', title:'StreamSQL-Repair-Bench: Does Execution Feedback Let Agents Fix Event-Time Streaming SQL?',
     first:'张浩宇', others:'王卓玺', venue:'IJICTT（期刊）', tier:'', year:2026, status:'accepted',
     arxiv:'', doi:'', citations:0, history:[]}
  ]
};

const STATUS = {
  published:{t:'已发表', cls:'st-published'},
  accepted:{t:'已录用', cls:'st-accepted'},
  preprint:{t:'预印本', cls:'st-preprint'},
  review:{t:'在投', cls:'st-review'}
};
const TIER_NAME = {A:'CCF A', B:'CCF B', C:'CCF C', W:'Workshop'};
const HUES = [265, 205, 160, 28, 340, 190, 95, 225];

function loadDraft(){
  try{
    const d = JSON.parse(localStorage.getItem(KEY));
    if(d && Array.isArray(d.members) && Array.isArray(d.papers)) return d;
  }catch(e){}
  return null;
}
let repoData = null;                    // 仓库 papers.json（权威数据）
let state = {members:[], papers:[]};    // init() 里填充
let isDraft = false;                    // 本地有未提交的草稿
const ui = {edit:false, sort:'default', editPaper:null, editMember:null, paperFor:''};

const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = n => Number(n||0).toLocaleString('en-US');
const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
function persist(){ localStorage.setItem(KEY, JSON.stringify(state)); isDraft = true; syncDraftBar(); }
function syncDraftBar(){ $('#draftBar').hidden = !isDraft; }
function discardDraft(){
  localStorage.removeItem(KEY);
  isDraft = false;
  state = JSON.parse(JSON.stringify(repoData || FALLBACK));
  syncDraftBar(); render(false);
}
function hueOf(m){ let h=0; for(const ch of String(m.name)) h=(h*31+ch.codePointAt(0))>>>0; return HUES[h%HUES.length]; }

/* ---------- 个人指标 ---------- */
function metrics(m){
  const first = state.papers.filter(p=>p.first===m.name);
  const co = state.papers.filter(p=>p.first!==m.name && (p.others||'').includes(m.name));
  const cites = first.reduce((s,p)=>s+(+p.citations||0),0);
  return {first, co, total:first.length+co.length, cites};
}
function personCurve(m){
  const papers = state.papers.filter(p=>p.first===m.name);
  const months = [...new Set(papers.flatMap(p=>(p.history||[]).map(h=>h.d)))].sort();
  return months.map(mo=>({m:mo, c:papers.reduce((s,p)=>{
    const hh=(p.history||[]).filter(x=>x.d<=mo); return s+(hh.length?hh[hh.length-1].c:0);},0)}));
}
function rising(p){
  const h=p.history||[];
  if(h.length<2) return null;
  const a=h[h.length-2].c, b=h[h.length-1].c;
  if((a>=1 && b>=a*1.3 && b-a>=3) || (a===0 && b>=3)) return `+${b-a}`;
  return null;
}

/* ---------- SVG 部件 ---------- */
function spark(hist, hue){
  if(!hist || hist.length<2) return '<span class="nospark">—</span>';
  const w=84,h=26,p=3, cs=hist.map(x=>x.c);
  const max=Math.max(...cs), min=Math.min(...cs);
  const X=i=>p+i*(w-2*p)/(cs.length-1);
  const Y=c=>max===min ? h/2 : h-p-(c-min)*(h-2*p)/(max-min);
  const pts=cs.map((c,i)=>`${X(i).toFixed(1)},${Y(c).toFixed(1)}`).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" aria-hidden="true" style="vertical-align:middle">
    <polyline points="${pts}" fill="none" stroke="hsla(${hue},80%,68%,.28)" stroke-width="4.5" stroke-linecap="round"/>
    <polyline points="${pts}" fill="none" stroke="hsl(${hue},80%,68%)" stroke-width="1.6"/>
    <circle cx="${X(cs.length-1).toFixed(1)}" cy="${Y(cs[cs.length-1]).toFixed(1)}" r="2.4" fill="hsl(${hue},85%,72%)"/></svg>`;
}
function areaChart(pts, hue){
  if(pts.length<2) return '<div class="empty" style="padding:18px">引用历史待积累 — 跑一次更新脚本就会出现第一批数据点</div>';
  const W=560,H=200,L=40,R=16,T=18,B=26;
  const max=Math.max(...pts.map(p=>p.c))||1;
  const X=i=>L+i*(W-L-R)/(pts.length-1);
  const Y=c=>T+(H-T-B)*(1-c/max);
  const grid=[0,.5,1].map(f=>{
    const v=Math.round(max*f), y=Y(v).toFixed(1);
    return `<line x1="${L}" y1="${y}" x2="${W-R}" y2="${y}" stroke="rgba(255,255,255,.06)"/>
      <text x="${L-7}" y="${+y+3.5}" text-anchor="end" font-size="10" fill="#68727f" font-family="ui-monospace,monospace">${v}</text>`;
  }).join('');
  const line=pts.map((p,i)=>`${X(i).toFixed(1)},${Y(p.c).toFixed(1)}`).join(' ');
  const area=`${L},${Y(0)} ${line} ${X(pts.length-1).toFixed(1)},${Y(0)}`;
  const lblIdx=[...new Set([0, Math.floor((pts.length-1)/2), pts.length-1])];
  const lbl=lblIdx.map(i=>{
    const anchor = i===0 ? 'start' : i===pts.length-1 ? 'end' : 'middle';
    return `<text x="${X(i).toFixed(1)}" y="${H-7}" text-anchor="${anchor}" font-size="10" fill="#68727f" font-family="ui-monospace,monospace">${pts[i].m}</text>`;
  }).join('');
  const last=pts[pts.length-1];
  const gid='g'+hue;
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="一作论文累计被引曲线">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsla(${hue},80%,62%,.34)"/><stop offset="1" stop-color="hsla(${hue},80%,62%,0)"/>
    </linearGradient></defs>
    ${grid}
    <polygon points="${area}" fill="url(#${gid})"/>
    <polyline points="${line}" fill="none" stroke="hsla(${hue},85%,66%,.32)" stroke-width="6" stroke-linecap="round"/>
    <polyline class="draw" points="${line}" fill="none" stroke="hsl(${hue},85%,70%)" stroke-width="2"/>
    <circle cx="${X(pts.length-1).toFixed(1)}" cy="${Y(last.c).toFixed(1)}" r="3.6" fill="hsl(${hue},90%,74%)"/>
    <text x="${(X(pts.length-1)-9).toFixed(1)}" y="${(Y(last.c)-9).toFixed(1)}" text-anchor="end" font-size="13" font-weight="700" fill="hsl(${hue},90%,78%)" font-family="ui-monospace,monospace">${last.c}</text>
    ${lbl}</svg>`;
}
function donut(firstN, coN, hue){
  const total=firstN+coN;
  const R=52, C=2*Math.PI*R;
  const f= total? firstN/total : 0;
  const a1=Math.max(f*C-3,0), a2=Math.max((1-f)*C-3,0);
  return `<svg viewBox="0 0 140 140" width="140" height="140" role="img" aria-label="一作与参与论文占比">
    <g transform="rotate(-90 70 70)">
      <circle cx="70" cy="70" r="${R}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="13"/>
      ${firstN?`<circle cx="70" cy="70" r="${R}" fill="none" stroke="hsl(${hue},80%,66%)" stroke-width="13"
        stroke-linecap="round" stroke-dasharray="${a1.toFixed(1)} ${(C-a1).toFixed(1)}"/>`:''}
      ${coN?`<circle cx="70" cy="70" r="${R}" fill="none" stroke="hsla(${hue},70%,66%,.32)" stroke-width="13"
        stroke-linecap="round" stroke-dasharray="${a2.toFixed(1)} ${(C-a2).toFixed(1)}" stroke-dashoffset="${(-f*C-3).toFixed(1)}"/>`:''}
    </g>
    <text x="70" y="66" text-anchor="middle" font-size="30" font-weight="700" fill="#e9edf2" font-family="Songti SC,Noto Serif SC,serif">${total}</text>
    <text x="70" y="86" text-anchor="middle" font-size="10" fill="#68727f" font-family="ui-monospace,monospace">TOTAL</text></svg>`;
}
function yearBars(m, hue){
  const mine=[...metrics(m).first, ...metrics(m).co];
  if(!mine.length) return '<div class="empty" style="padding:18px">暂无论文</div>';
  const years=[...new Set(mine.map(p=>+p.year))].sort();
  const data=years.map(y=>({y,
    f:mine.filter(p=>+p.year===y && p.first===m.name).length,
    c:mine.filter(p=>+p.year===y && p.first!==m.name).length}));
  const W=560,H=170,B=26,T=16;
  const max=Math.max(...data.map(d=>d.f+d.c))||1;
  const slot=(W-40)/data.length, bw=Math.min(46,slot*.48);
  const bars=data.map((d,i)=>{
    const cx=40+slot*i+slot/2;
    let yTop=H-B, segs='';
    const seg=(n,color)=>{ if(!n) return; const hh=(H-B-T)*n/max; yTop-=hh;
      segs+=`<rect x="${(cx-bw/2).toFixed(1)}" y="${yTop.toFixed(1)}" width="${bw}" height="${Math.max(hh-2,1.5).toFixed(1)}" rx="3.5" fill="${color}"/>`; };
    seg(d.f,`hsl(${hue},78%,64%)`); seg(d.c,`hsla(${hue},70%,64%,.3)`);
    return segs+`<text x="${cx}" y="${(yTop-6).toFixed(1)}" text-anchor="middle" font-size="12" font-weight="700" fill="#e9edf2" font-family="ui-monospace,monospace">${d.f+d.c}</text>
      <text x="${cx}" y="${H-8}" text-anchor="middle" font-size="10.5" fill="#68727f" font-family="ui-monospace,monospace">${d.y}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="每年论文数">
    <line x1="22" y1="${H-B}" x2="${W-12}" y2="${H-B}" stroke="rgba(255,255,255,.08)"/>${bars}</svg>`;
}

/* ---------- 视图 ---------- */
function avatarHtml(m, hue){ return `<span class="pavatar" style="--h:${hue}">${esc(m.name.slice(0,1))}</span>`; }

function homeView(){
  let members=[...state.members];
  if(ui.sort==='cites') members.sort((a,b)=>metrics(b).cites-metrics(a).cites);
  if(ui.sort==='papers') members.sort((a,b)=>metrics(b).total-metrics(a).total);
  const cards=members.map(m=>{
    const h=hueOf(m), mt=metrics(m);
    const curve=personCurve(m);
    return `<article class="card pcard" style="--h:${h}" data-open="${m.id}" tabindex="0" role="link" aria-label="打开 ${esc(m.name)} 的主页">
      <span class="ghost-initial">${esc(m.name.slice(0,1))}</span>
      <div class="pcard-actions edit-only">
        <button data-medit="${m.id}">编辑</button><button data-mdel="${m.id}">移除</button>
      </div>
      <div class="phead">${avatarHtml(m,h)}
        <div><div class="pname">${esc(m.name)}</div><div class="prole">${esc(m.role||'')}</div></div>
      </div>
      ${m.focus?`<span class="pfocus">${esc(m.focus)}</span>`:''}
      <div class="pstats">
        <div><div class="n">${mt.total}</div><div class="l">论文</div></div>
        <div><div class="n">${mt.first.length}</div><div class="l">一作</div></div>
        <div><div class="n">${mt.co.length}</div><div class="l">参与</div></div>
        <div><div class="n" style="color:hsl(${h},82%,74%)">${fmt(mt.cites)}</div><div class="l">被引</div></div>
      </div>
      ${curve.length>1?`<div>${spark(curve.map(p=>({c:p.c})),h)}</div>`:''}
      <span class="go">进入主页 →</span>
    </article>`;
  }).join('');
  return `<div class="home-head">
      <div><h1>成员论文档案</h1><div class="sub">点击任意成员查看个人统计与论文明细</div></div>
      <div class="seg" role="group" aria-label="排序">
        <button data-sort="default" aria-pressed="${ui.sort==='default'}">默认</button>
        <button data-sort="cites" aria-pressed="${ui.sort==='cites'}">按被引</button>
        <button data-sort="papers" aria-pressed="${ui.sort==='papers'}">按论文数</button>
      </div>
    </div>
    <div class="people">${cards}
      <button class="card pcard add-card edit-only" id="btnAddMember">＋ 添加成员</button>
    </div>`;
}

function paperRow(p, hue, showRole){
  const st=STATUS[p.status]||STATUS.review;
  const links=[
    p.arxiv?`<a href="https://arxiv.org/abs/${esc(p.arxiv)}" target="_blank" rel="noopener">arXiv:${esc(p.arxiv)}</a>`:'',
    p.doi?`<a href="https://doi.org/${esc(p.doi)}" target="_blank" rel="noopener">DOI</a>`:''
  ].filter(Boolean).join('');
  const needArxiv=(p.status==='accepted'&&!p.arxiv)?`<span class="hint-arxiv" title="没有 arXiv 预印本，引用无法自动追踪">建议挂 arXiv</span>`:'';
  const r=rising(p);
  return `<div class="card paper-row" style="--h:${hue}">
    <div>
      <div class="ttl">${esc(p.title)}</div>
      <div class="meta">
        ${showRole?`<span class="chip" style="background:rgba(255,255,255,.07);color:var(--muted)">一作 ${esc(p.first)}</span>`:''}
        <span>${esc(p.venue||'—')}</span>
        ${p.tier?`<span class="tier tier-${p.tier}">${TIER_NAME[p.tier]}</span>`:''}
        <span class="yr">${esc(p.year)}</span>
        <span class="chip ${st.cls}">${st.t}</span>
        ${links} ${needArxiv}
      </div>
    </div>
    <div class="cites">
      ${r?`<span class="rising">▲ ${r}</span>`:''}
      ${spark(p.history,hue)}
      <span class="cnum">${fmt(p.citations)}<small>被引</small></span>
    </div>
    <div class="acts edit-only"><button data-pedit="${p.id}">编辑</button><button data-pdel="${p.id}">删除</button></div>
  </div>`;
}

function memberView(id){
  const m=state.members.find(x=>x.id===id);
  if(!m) return `<div class="empty" style="margin-top:30px">成员不存在，可能已被移除。<a href="#/" style="text-decoration:underline">返回成员墙</a></div>`;
  const h=hueOf(m), mt=metrics(m);
  const byYear=(a,b)=>(+b.year)-(+a.year) || (+b.citations||0)-(+a.citations||0);
  const firstRows=mt.first.sort(byYear).map(p=>paperRow(p,h,false)).join('') || '<div class="empty">暂无一作论文</div>';
  const coRows=mt.co.sort(byYear).map(p=>paperRow(p,h,true)).join('');
  const best=mt.first.slice().sort((a,b)=>(+b.citations||0)-(+a.citations||0))[0];
  return `<a class="back" href="#/">← 全部成员</a>
    <section class="card hero" style="--h:${h}">
      <span class="ghost-initial">${esc(m.name.slice(0,1))}</span>
      ${avatarHtml(m,h)}
      <div>
        <h1>${esc(m.name)}</h1>
        <div class="meta"><span class="prole">${esc(m.role||'')}</span>${m.focus?`<span class="pfocus">${esc(m.focus)}</span>`:''}</div>
      </div>
      <div class="hero-actions edit-only">
        <button class="btn" data-medit="${m.id}">编辑资料</button>
        <button class="btn" data-mdel="${m.id}">移除成员</button>
      </div>
    </section>

    <div class="bento" style="--h:${h}">
      <div class="card tile"><div class="lbl">论文总数</div><div class="num" data-count="${mt.total}">0</div><div class="sub">一作 + 参与</div></div>
      <div class="card tile"><div class="lbl">一作</div><div class="num" data-count="${mt.first.length}">0</div><div class="sub">第一作者论文</div></div>
      <div class="card tile"><div class="lbl">参与</div><div class="num" data-count="${mt.co.length}">0</div><div class="sub">非一作合作论文</div></div>
      <div class="card tile hl"><div class="lbl">被引</div><div class="num" data-count="${mt.cites}">0</div><div class="sub">一作论文口径 · Semantic Scholar</div></div>
    </div>

    <div class="chart-bento" style="--h:${h}">
      <div class="card chart-tile">
        <h3>被引增长</h3><div class="desc">一作论文累计被引 · 每跑一次更新脚本多一个数据点</div>
        ${areaChart(personCurve(m),h)}
      </div>
      <div class="card chart-tile">
        <h3>论文构成</h3><div class="desc">一作 vs 参与</div>
        <div class="donut-wrap">${donut(mt.first.length,mt.co.length,h)}
          <div class="donut-legend">
            <span><span class="sw" style="background:hsl(${h},78%,64%)"></span>一作 <b>${mt.first.length}</b></span>
            <span><span class="sw" style="background:hsla(${h},70%,64%,.32)"></span>参与 <b>${mt.co.length}</b></span>
            ${best&&(+best.citations||0)>0?`<span style="max-width:150px;font-size:11.5px;color:var(--faint)">代表作 ${fmt(best.citations)} 被引</span>`:''}
          </div>
        </div>
      </div>
      <div class="card chart-tile" style="grid-column:1 / -1">
        <h3>每年产出</h3><div class="desc">实色为一作，浅色为参与</div>
        ${yearBars(m,h)}
      </div>
    </div>

    <div class="sec-head" style="--h:${h}">
      <h2>一作论文<span class="cnt">${mt.first.length}</span></h2>
      <button class="btn primary edit-only" data-addpaper="${esc(m.name)}" style="--hue:${h}">＋ 添加论文</button>
    </div>
    <div class="paper-stack" style="--h:${h}">${firstRows}</div>
    ${mt.co.length?`<div class="sec-head"><h2>参与合作<span class="cnt">${mt.co.length}</span></h2></div>
    <div class="paper-stack" style="--h:${h}">${coRows}</div>`:''}`;
}

function dataView(){
  return `<div class="doc">
    <h1>论文数据从哪来</h1>
    <p>看板里的元数据（标题、一作、会议、状态）手动维护；<b>引用数</b>由脚本定期从公开 API 拉取并累积成历史曲线。核心判断是<b>有没有 arXiv</b>，而不是发没发表：</p>
    <div class="path-grid">
      <div class="path-card card"><span class="chip st-published">已发表</span><h4>全自动</h4>
        <p>录入 DOI 或 arXiv ID，每周脚本自动刷新引用并追加历史点。</p></div>
      <div class="path-card card"><span class="chip st-accepted">已录用、未见刊</span><h4>有 arXiv 就能追</h4>
        <p>会议接收 ≠ 可检索。已挂 arXiv：照常自动追，正式版出来后 Semantic Scholar 会合并两版引用。没挂：引用必然是 0，先手动录入，尽快传 arXiv 让引用开始累积。</p></div>
      <div class="path-card card"><span class="chip st-review">在投 / 预印本</span><h4>维护状态即可</h4>
        <p>在投论文只需维护状态流转（在投 → 录用 → 见刊）；有预印本的照样自动追引用。</p></div>
    </div>
    <h2>数据源（已实测可用）</h2>
    <p><b>Semantic Scholar Graph API</b>（主源）：免费，支持 arXiv ID / DOI 直查，收录 arXiv 快。</p>
    <pre>curl "https://api.semanticscholar.org/graph/v1/paper/arXiv:1706.03762?fields=citationCount,title"
<span class="cm"># → {"title": "Attention is All you Need", "citationCount": 183073}</span></pre>
    <p><b>OpenAlex</b>（备用）：免费无需密钥，按标题搜索，字段 <span class="kbd">cited_by_count</span>。</p>
    <p class="note">注：① Semantic Scholar 匿名访问走公共限流池，脚本加 2 秒间隔即可，量大可免费申请 key；② Google Scholar 引用数最高但无官方 API，爬取违反其条款，建议统一按 Semantic Scholar 口径汇报。</p>
    <div class="code-head">
      <span><b>update_citations.py</b> — 每周跑一次（cron / GitHub Action），刷新 papers.json</span>
      <button class="btn" id="btnCopyScript">复制脚本</button>
    </div>
    <pre id="pyScript">import json, time, urllib.request

API = "https://api.semanticscholar.org/graph/v1/paper/{}?fields=citationCount"

def fetch(paper_id):
    req = urllib.request.Request(API.format(paper_id),
                                 headers={"User-Agent": "lab-papers/1.0"})
    with urllib.request.urlopen(req, timeout=15) as r:
        return json.load(r)["citationCount"]

data = json.load(open("papers.json", encoding="utf-8"))
today = time.strftime("%Y-%m")
for p in data["papers"]:
    pid = ("arXiv:" + p["arxiv"]) if p.get("arxiv") else \
          (("DOI:" + p["doi"]) if p.get("doi") else None)
    if not pid:
        continue  # 在投、无 arXiv 的论文跳过，状态手动维护
    try:
        c = fetch(pid)
        p["citations"] = c
        hist = p.setdefault("history", [])
        if hist and hist[-1]["d"] == today:
            hist[-1]["c"] = c
        else:
            hist.append({"d": today, "c": c})
        print(f"{c:>6}  {p['title'][:50]}")
    except Exception as e:
        print(f"  跳过 {p['title'][:40]}: {e}")
    time.sleep(2)  # 匿名限流是公共池，温柔一点

json.dump(data, open("papers.json", "w", encoding="utf-8"),
          ensure_ascii=False, indent=2)</pre>

/* ---------- 路由与渲染 ---------- */
function route(){
  const hash=location.hash||'#/';
  const mMatch=hash.match(/^#\/m\/(.+)$/);
  if(mMatch) return {view:'member', id:decodeURIComponent(mMatch[1])};
  if(hash==='#/data') return {view:'data'};
  return {view:'home'};
}
function currentHue(){
  const r=route();
  if(r.view==='member'){ const m=state.members.find(x=>x.id===r.id); if(m) return hueOf(m); }
  return 215;
}
function render(animate){
  const r=route();
  const app=$('#app');
  document.documentElement.style.setProperty('--hue', currentHue());
  app.classList.toggle('anim', !!animate && !REDUCED);
  app.innerHTML = r.view==='member' ? memberView(r.id) : r.view==='data' ? dataView() : homeView();
  if(animate && !REDUCED) countUp(app);
  else app.querySelectorAll('[data-count]').forEach(el=>{ el.textContent=fmt(+el.dataset.count); });
  window.scrollTo({top:0, behavior:'instant'});
}
function countUp(root){
  root.querySelectorAll('[data-count]').forEach(el=>{
    const target=+el.dataset.count, dur=750, t0=performance.now();
    let done=false;
    const finish=()=>{ if(done) return; done=true; el.textContent=fmt(target); };
    const step=t=>{
      if(done) return;
      const k=Math.min((t-t0)/dur,1), e=1-Math.pow(1-k,3);
      el.textContent=fmt(Math.round(target*e));
      if(k<1) requestAnimationFrame(step); else finish();
    };
    requestAnimationFrame(step);
    setTimeout(finish, dur+350); // 兜底：后台标签页 rAF 被暂停时直接落到终值
  });
}
window.addEventListener('hashchange', ()=>render(true));

/* ---------- 交互 ---------- */
$('#app').addEventListener('click', e=>{
  const sort=e.target.closest('[data-sort]');
  if(sort){ ui.sort=sort.dataset.sort; render(false); return; }
  const me=e.target.closest('[data-medit]');
  if(me){ e.stopPropagation(); openMemberDlg(me.dataset.medit); return; }
  const md=e.target.closest('[data-mdel]');
  if(md){ e.stopPropagation(); removeMember(md.dataset.mdel); return; }
  const ap=e.target.closest('[data-addpaper]');
  if(ap){ openPaperDlg(null, ap.dataset.addpaper); return; }
  const pe=e.target.closest('[data-pedit]');
  if(pe){ openPaperDlg(pe.dataset.pedit); return; }
  const pd=e.target.closest('[data-pdel]');
  if(pd){ removePaper(pd.dataset.pdel); return; }
  if(e.target.closest('#btnAddMember')){ openMemberDlg(null); return; }
  if(e.target.id==='btnCopyScript'){ copyScript(e.target); return; }
  const open=e.target.closest('[data-open]');
  if(open){ location.hash='#/m/'+open.dataset.open; return; }
});
$('#app').addEventListener('keydown', e=>{
  if(e.key!=='Enter') return;
  const open=e.target.closest('[data-open]');
  if(open) location.hash='#/m/'+open.dataset.open;
});

$('#btnEdit').addEventListener('click', ()=>{
  ui.edit=!ui.edit;
  document.body.classList.toggle('editing', ui.edit);
  $('#btnEdit').setAttribute('aria-pressed', String(ui.edit));
});
$('#btnDiscard').addEventListener('click', ()=>{
  if(!confirm('丢弃本地草稿，回到仓库 papers.json 的数据？')) return;
  discardDraft();
});

/* 导入 / 导出 */
$('#btnExport').addEventListener('click', ()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`papers-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(a.href);
});
$('#btnImport').addEventListener('click', ()=>$('#importFile').click());
$('#importFile').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const d=JSON.parse(rd.result);
      if(!Array.isArray(d.members)||!Array.isArray(d.papers)) throw new Error('bad');
      state=d; persist(); render(false);
    }catch(err){ alert('导入失败：JSON 需包含 members 和 papers 两个数组。'); }
    e.target.value='';
  };
  rd.readAsText(f);
});

/* 论文增删改 */
function openPaperDlg(id, presetFirst){
  ui.editPaper=id||null;
  $('#paperDlgTitle').textContent=id?'编辑论文':'添加论文';
  const f=$('#paperForm'); f.reset();
  $('#memberList').innerHTML=state.members.map(m=>`<option value="${esc(m.name)}">`).join('');
  if(id){
    const p=state.papers.find(x=>x.id===id);
    for(const k of ['title','first','others','venue','tier','year','status','arxiv','doi','citations']) f.elements[k].value=p[k]??'';
  } else {
    f.elements.year.value=new Date().getFullYear();
    if(presetFirst) f.elements.first.value=presetFirst;
  }
  $('#paperDlg').showModal();
}
function removePaper(id){
  const p=state.papers.find(x=>x.id===id);
  if(p && confirm(`删除「${p.title.slice(0,40)}…」？`)){
    state.papers=state.papers.filter(x=>x.id!==id); persist(); render(false);
  }
}
$('#paperForm').addEventListener('submit', e=>{
  e.preventDefault();
  const f=e.target, v=k=>f.elements[k].value.trim();
  const cit=+f.elements.citations.value||0;
  const month=new Date().toISOString().slice(0,7);
  if(ui.editPaper){
    const p=state.papers.find(x=>x.id===ui.editPaper);
    Object.assign(p,{title:v('title'),first:v('first'),others:v('others'),venue:v('venue'),tier:v('tier'),
      year:+v('year'),status:v('status'),arxiv:v('arxiv'),doi:v('doi')});
    if(cit!==(+p.citations||0)){
      p.citations=cit; p.history=p.history||[];
      if(p.history.length && p.history[p.history.length-1].d===month) p.history[p.history.length-1].c=cit;
      else p.history.push({d:month,c:cit});
    }
  } else {
    state.papers.push({id:'p'+Date.now(), title:v('title'),first:v('first'),others:v('others'),venue:v('venue'),
      tier:v('tier'),year:+v('year'),status:v('status'),arxiv:v('arxiv'),doi:v('doi'),
      citations:cit, history:cit>0?[{d:month,c:cit}]:[]});
  }
  persist(); $('#paperDlg').close(); render(false);
});

/* 成员增删改 */
function openMemberDlg(id){
  ui.editMember=id||null;
  $('#memberDlgTitle').textContent=id?'编辑成员':'添加成员';
  const f=$('#memberForm'); f.reset();
  if(id){
    const m=state.members.find(x=>x.id===id);
    for(const k of ['name','role','focus']) f.elements[k].value=m[k]??'';
  }
  $('#memberDlg').showModal();
}
function removeMember(id){
  const m=state.members.find(x=>x.id===id);
  if(!m) return;
  const n=state.papers.filter(p=>p.first===m.name).length;
  if(confirm(`移除成员「${m.name}」？${n?`其 ${n} 篇一作论文会保留在数据里。`:''}`)){
    state.members=state.members.filter(x=>x.id!==id); persist();
    if(route().view==='member') location.hash='#/'; else render(false);
  }
}
$('#memberForm').addEventListener('submit', e=>{
  e.preventDefault();
  const f=e.target, v=k=>f.elements[k].value.trim();
  if(ui.editMember){
    const m=state.members.find(x=>x.id===ui.editMember);
    const old=m.name;
    Object.assign(m,{name:v('name'),role:v('role'),focus:v('focus')});
    if(old!==m.name) state.papers.forEach(p=>{
      if(p.first===old) p.first=m.name;
      if(p.others) p.others=p.others.split(/[,，]/).map(s=>s.trim()===old?m.name:s.trim()).join(', ');
    });
  } else {
    state.members.push({id:'m'+Date.now(), name:v('name'), role:v('role'), focus:v('focus')});
  }
  persist(); $('#memberDlg').close(); render(false);
});

document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click', ()=>$('#'+b.dataset.close).close()));

async function copyScript(btn){
  try{
    await navigator.clipboard.writeText($('#pyScript').textContent);
    btn.textContent='已复制 ✓';
    setTimeout(()=>btn.textContent='复制脚本',1600);
  }catch(err){ alert('复制失败，请手动选择文本复制。'); }
}

async function init(){
  try{
    const r = await fetch('papers.json', {cache:'no-store'});
    if(r.ok) repoData = await r.json();
  }catch(e){ /* file:// 或离线：用内置兜底数据 */ }
  const draft = loadDraft();
  if(draft){ state = draft; isDraft = true; }
  else state = JSON.parse(JSON.stringify(repoData || FALLBACK));
  syncDraftBar();
  render(true);
}
init();
