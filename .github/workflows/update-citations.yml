name: 更新引用数据

on:
  schedule:
    - cron: '30 1 * * 1'   # 每周一 01:30 UTC = 北京时间周一 09:30
  workflow_dispatch:        # 也可以在 Actions 页手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 拉取最新引用（Semantic Scholar）
        run: python update_citations.py
        env:
          S2_API_KEY: ${{ secrets.S2_API_KEY }}   # 可选，没配也能跑

      - name: 提交变更（如有）
        run: |
          git config user.name "citation-bot"
          git config user.email "actions@users.noreply.github.com"
          git add papers.json
          if git diff --cached --quiet; then
            echo "引用无变化，不提交"
          else
            git commit -m "chore: 更新引用数据 $(date -u +%F)"
            git push
          fi
